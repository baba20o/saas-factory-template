# SaaS Factory Configuration
# Change these values to create a new product from the template

product:
  name: "PlanForge"
  tagline: "Turn rough ideas into actionable project plans in seconds"
  description: "AI-powered project planning that breaks down any idea into milestones, tasks, and timelines."
  domain: "planforge.app"

branding:
  primary_color: "#6366f1"    # indigo-500
  accent_color: "#f59e0b"     # amber-500
  logo_text: "PlanForge"      # text-based logo (or path to SVG)

# Theme configuration — controls the entire visual identity
# Set mode to "light" for a light theme. Null values auto-resolve from mode.
theme:
  mode: "dark"                # "dark" | "light"
  colors:
    primary: "#6366f1"        # Buttons, links, accents
    accent: "#f59e0b"         # Secondary accent
    # Null = auto-resolved from mode (dark/light defaults)
    # background: null
    # surface: null
    # border: null
    # text_primary: null
    # text_secondary: null
    # text_muted: null
  radius: "xl"                # Border radius scale
  glassmorphism: true         # Backdrop-blur glass effects on/off

# Landing page section order — omit a section to exclude it
# Each section has a type and optional variant
landing:
  sections:
    - type: "nav"
    - type: "hero"
      variant: "3d-orbs"        # "3d-orbs" | "gradient-mesh" | "particles" | "minimal"
    - type: "features"
      variant: "cards"
    - type: "how-it-works"
      variant: "steps"
    - type: "project-graph"
      variant: "force-directed"
    - type: "live-metrics"
      variant: "sparklines"
    - type: "testimonials"
      variant: "carousel"
    - type: "pricing"
      variant: "cards"
    - type: "faq"
      variant: "accordion"
    - type: "footer"
      variant: "full"            # "full" | "simple" | "minimal"

hero:
  headline: "From Idea to Plan in 60 Seconds"
  subheadline: "Describe your project. Get a detailed breakdown with milestones, dependencies, and time estimates — powered by AI."
  cta_text: "Try It Free"
  cta_link: "/app"

features:
  - title: "Instant Breakdown"
    description: "Paste any idea and get milestones, tasks, and dependencies in seconds."
    icon: "zap"
    detail: "Our AI engine analyzes your project description, identifies key deliverables, maps dependencies between tasks, and generates a complete work breakdown structure. It handles everything from simple side projects to complex multi-team initiatives with dozens of milestones."
  - title: "Smart Timelines"
    description: "AI estimates realistic timelines based on project complexity."
    icon: "clock"
    detail: "Smart Timelines uses machine learning trained on thousands of real-world projects to estimate task durations with high accuracy. It factors in complexity, team capacity, and historical data to produce timelines your stakeholders can actually trust."
  - title: "Export Anywhere"
    description: "Download as PDF, Markdown, or sync to Jira, Linear, and GitHub."
    icon: "download"
    detail: "Export your plans in the format your team needs. Generate polished PDF reports for stakeholders, Markdown for documentation, or push directly to Jira, Linear, GitHub Projects, and Notion with full two-way sync that keeps everything up to date."
  - title: "Team Sharing"
    description: "Collaborate on plans in real-time with your entire team."
    icon: "users"
    detail: "Share plans with your team via invite links or workspace integration. Team members can comment, suggest changes, and get notified when plans update. Role-based permissions ensure the right people have the right level of access."

pricing:
  - name: "Free"
    price: 0
    interval: "month"
    stripe_price_id: ""
    features:
      - "3 plans per month"
      - "Basic AI breakdown"
      - "Markdown export"
    cta: "Get Started"
    highlighted: false
  - name: "Pro"
    price: 5
    interval: "month"
    stripe_price_id: "price_1TAwH9Jl8VOqMrJRMrMFFaXC"
    features:
      - "Unlimited plans"
      - "Advanced AI with GPT-4"
      - "PDF + Jira + Linear export"
      - "Team sharing"
      - "Priority support"
    cta: "Start Free Trial"
    highlighted: true

dashboard:
  nav_items:
    - label: "Dashboard"
      icon: "layout-dashboard"
      href: "/app"
    - label: "API Keys"
      icon: "key"
      href: "/app/keys"
    - label: "Settings"
      icon: "settings"
      href: "/app/settings"
    - label: "Billing"
      icon: "credit-card"
      href: "/app/billing"
  stats:
    - label: "Plans Created"
      key: "plans_created"
    - label: "Exports"
      key: "exports"
    - label: "Team Members"
      key: "team_members"

footer:
  company: "GMC Corp"
  links:
    - label: "Privacy"
      href: "/privacy"
    - label: "Terms"
      href: "/terms"
